<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#08090d" />
    <title>SLR OTG</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #08090d;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.18), transparent 42%), #08090d;
      }

      main {
        width: min(100%, 420px);
        display: grid;
        gap: 14px;
        text-align: center;
      }

      img {
        width: 84px;
        height: 84px;
        margin: 0 auto 4px;
        border-radius: 22px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: rgba(248, 250, 252, 0.72);
        font-size: 15px;
        line-height: 1.55;
      }

      a {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: #22d3ee;
        color: #061016;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>SLR OTG</h1>
      <p>The Android shell is installed. Connect to the OTG server to continue.</p>
      <a href="https://comf-otg.comfyui-otg.win/app">Open OTG</a>
    </main>
  </body>
</html>
